<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울 vs 추풍령 기온 비교 (1970-2025)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f8f9fa; 
            padding: 40px 20px;
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto;
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #333; }
        p { text-align: center; color: #666; margin-bottom: 20px; }
        canvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌡️ 서울 vs 추풍령 연평균 기온 변화 (1970~2025)</h2>
        <p>마우스를 올리면 상세 온도가 표시됩니다.</p>
        <canvas id="tempChart"></canvas>
    </div>

    <script>
        // CSV 파일 없이 올려주신 데이터를 배열로 직접 넣었습니다!
        const years = [1970, 1971, 1972, 1973, 1974, 1975, 1976, 1977, 1978, 1979, 1980, 1981, 1982, 1983, 1984, 1985, 1986, 1987, 1988, 1989, 1990, 1991, 1992, 1993, 1994, 1995, 1996, 1997, 1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025];
        
        const seoulTemps = [11.4, 11.5, 11.9, 12, 11.1, 12.5, 11.5, 12.3, 12.4, 12.5, 10.8, 11.2, 12.5, 12.4, 11.6, 11.6, 11.2, 11.9, 12.1, 13, 12.8, 12.3, 12.5, 12, 13.5, 12.2, 12.2, 12.9, 13.8, 13.2, 12.7, 12.8, 12.9, 12.8, 13.3, 12.1, 13, 13.3, 12.9, 12.9, 12.1, 12, 12.2, 12.5, 13.4, 13.6, 13.6, 13, 12.9, 13.5, 13.2, 13.7, 13.2, 14.1, 14.9, 14.1];
        
        const cpTemps = [11, 11.2, 11.5, 11.8, 10.8, 11.9, 11, 11.9, 12.4, 12, 10.6, 11.1, 12, 11.8, 11.2, 11.3, 10.9, 11.5, 11.3, 12.1, 12.3, 11.5, 11.7, 11.2, 12.7, 11.4, 11.4, 11.9, 12.5, 12, 11.4, 11.9, 11.8, 11.5, 12.3, 11.4, 11.6, 11.8, 12, 12, 11.6, 11.5, 11.2, 11.8, 11.7, 12.2, 12.4, 11.9, 11.9, 12.4, 12, 12.3, 12, 12.8, 13.5, 12.7];

        const ctx = document.getElementById('tempChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: years,
                datasets: [
                    {
                        label: '서울 (실험군: 대도시)',
                        data: seoulTemps,
                        borderColor: '#ff4d4d',
                        backgroundColor: 'rgba(255, 77, 77, 0.1)',
                        borderWidth: 3,
                        pointRadius: 3,
                        pointHoverRadius: 7,
                        tension: 0.3
                    },
                    {
                        label: '추풍령 (대조군: 자연상태)',
                        data: cpTemps,
                        borderColor: '#2ecc71',
                        backgroundColor: 'rgba(46, 204, 113, 0.1)',
                        borderWidth: 3,
                        pointRadius: 3,
                        pointHoverRadius: 7,
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y + '°C';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        title: { display: true, text: '평균 기온 (°C)' },
                        ticks: { callback: value => value + '°C' }
                    },
                    x: {
                        title: { display: true, text: '연도' },
                        // X축에 모든 연도가 겹치지 않고 잘 보이도록 간격 자동 조정
                        ticks: { maxTicksLimit: 20 } 
                    }
                }
            }
        });
    </script>
</body>
</html>
